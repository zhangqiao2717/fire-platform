name: tianze-fire-monitor

  on:
    schedule:
      - cron: '0,30 0-14 * * *'
    workflow_dispatch:

  jobs:
    scrape-alarms:
      runs-on: ubuntu-latest
      steps:
        - name: checkout
          uses: actions/checkout@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN }}

        - name: setup-node
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: install
          run: |
            cd scripts
            npm init -y
            npm install puppeteer

        - name: scrape
          env:
            TIANZE_USERNAME: ${{ secrets.TIANZE_USERNAME }}
            TIANZE_PASSWORD: ${{ secrets.TIANZE_PASSWORD }}
            TIANZE_URL: ${{ secrets.TIANZE_URL }}
            FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          run: node scripts/scrape_tianze.js

        - name: upload-screenshot
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: alarm-screenshot
            path: alarm_screenshot.png
            retention-days: 3

        - name: commit
          run: |
            git config --local user.email "action@github.com"
            git config --local user.name "FireBot"
            git add data.json
            git diff --staged --quiet || git commit -m "fire data update"
            git push
