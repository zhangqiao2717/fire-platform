name: monthly-plan-dispatch

on:
  schedule:
    # 每月1日 UTC 00:00 = 北京时间 08:00
    - cron: '0 0 1 * *'
  # 手动触发（测试用）
  workflow_dispatch:
    inputs:
      month:
        description: '指定月份（留空=当前月）'
        required: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 推送月度保养任务
        env:
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          if [ -n "${{ github.event.inputs.month }}" ]; then
            node scripts/send_monthly_plan.js --month=${{ github.event.inputs.month }}
          else
            node scripts/send_monthly_plan.js
          fi

      - name: 📦 提交下发记录
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "FireBot"
          git add data.json
          git diff --staged --quiet || git commit -m "📋 $(TZ='Asia/Shanghai' date '+%Y年%m月')保养任务已下发"
          git push
